name: Build & Release

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip pytest pyflakes
      - name: Lint (pyflakes)
        run: python -m pyflakes pogodecode
      - name: Test
        run: python -m pytest -q

  build:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
          - os: macos-latest
            label: macos
          - os: ubuntu-latest
            label: linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Ensure Tk (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y python3-tk
      - name: Install PyInstaller
        run: python -m pip install --upgrade pip pyinstaller
      - name: Install Windows theming dependency
        if: matrix.os == 'windows-latest'
        run: python -m pip install pywinstyles
      - name: Build executables
        run: pyinstaller --noconfirm pogodecode.spec
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path dist/PoGoGameMasterDecoder.exe,dist/PoGoPokedexViewer.exe,README.md,LICENSE -DestinationPath pogo-tools-windows.zip
        shell: pwsh
      - name: Package (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cp README.md LICENSE dist/
          cd dist && tar czf ../pogo-tools-${{ matrix.label }}.tar.gz \
            PoGoGameMasterDecoder PoGoPokedexViewer README.md LICENSE
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pogo-tools-${{ matrix.label }}
          path: |
            pogo-tools-*.zip
            pogo-tools-*.tar.gz
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Attach binaries to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
